<div
  class="rounded-3xl border border-slate-200 bg-white p-6 shadow-lg hover:shadow-2xl transition-all w-[50%]"
>
  @if(image()){
    <img
      [src]="image()"
      alt="card image"
      class="w-full h-48 object-cover rounded-2xl mb-4"
    />
  }

  <h2 class="text-2xl font-bold text-slate-800">
    {{ title() }}
  </h2>

  <p class="text-slate-500 mb-4">
    {{ subtitle() }}
  </p>

  <div>
    <ng-content></ng-content>
  </div>

  <button
    class="mt-4 px-4 py-2 bg-blue-500 text-white rounded-xl"
  >
    {{ buttonText() }}
  </button>
</div>
